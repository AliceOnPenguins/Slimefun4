# options:
# auto-update - Automatická kontrola a aktualizace nových verzí z Githubu
# armor-update-interval - Interval aktualizace efektů zbroje Slimefun
# enable-armor-effects - Zapnutí/vypnutí efektů zbroje
# chat-prefix - Prefix všech zpráv Slimefun
# auto-save-delay-in-minutes - Interval automatického ukládání dat (v minutách)
# legacy-ore-washer - Zda používat starý mechanismus pračky rud
# legacy-dust-washer - Zda používat starý mechanismus pračky prachu
# legacy-ore-grinder - Zda používat starý mechanismus drtiče rud
# language - Jazyk textů Slimefun (neobsahuje předměty)
# enable-translations - Funkce vícejazyčnosti
# backwards-compatibility - Režim zpětné kompatibility předmětů, po vypnutí budou předměty používat nový systém
#                           (Zlepší výkon)
# log-duplicate-block-entries - Zda vypisovat varování při nalezení duplicitních bloků
# burn-players-when-radioactive - Zda spalovat hráče při expozici radiaci
# drop-excess-sf-give-items - Zda při plném inventáři příkaz /sf give rovnou vyhodí přebytečné předměty
# backup-data - Automatické zálohování dat
# bypass-environment-check - Přeskočit kontrolu kompatibility (Pozor: po zapnutí nebudou přijímány bug reporty)
options:
  auto-update: true
  chat-prefix: '&a&lSlimefun 4 &7> '
  armor-update-interval: 10
  enable-armor-effects: true
  enable-radiation: true
  radiation-update-interval: 1
  radiation-grace-period: 15
  rainbow-armor-update-interval: 3
  auto-save-delay-in-minutes: 10
  legacy-ore-washer: false
  legacy-dust-washer: false
  legacy-ore-grinder: true
  language: zh-CN
  enable-translations: true
  log-duplicate-block-entries: true
  burn-players-when-radioactive: true
  drop-excess-sf-give-items: false
  backup-data: true
  drop-block-creative: true
  bypass-environment-check: false
  bypass-item-length-check: false
  max-gps-waypoints: 21

guide:
  # Zda zobrazovat v příručce recepty vanilla předmětů
  show-vanilla-recipes: true
  # Zda automaticky dát Slimefun příručku hráči při prvním vstupu na server
  receive-on-first-join: true
  # Zda zobrazovat skryté skupiny předmětů ve vyhledávání
  show-hidden-item-groups-in-search: false

researches:
  # Zda mohou hráči v kreativním módu odemykat výzkumy zdarma
  free-in-creative-mode: true
  # Zda při odemčení výzkumu vystřelit ohňostroj
  enable-fireworks: true
  # Zda používat herní měnu místo zkušeností k odemykání
  use-money-unlock: false
  # Koeficient převodu zkušeností na herní měnu
  currency-cost-convert-rate: 25.0
  # Zda vypnout animaci učení výzkumu
  disable-learning-animation: false

URID:
  info-delay: 3000
  custom-ticker-delay: 10
  enable-tickers: true

networks:
  max-size: 200
  cargo-ticker-delay: 0
  enable-visualizer: true
  delete-excess-items: false

talismans:
  use-actionbar: true

metrics:
  auto-update: false

backpack:
  # Zda lze otevřít batoh, i když je jeho vlastník offline
  allow-open-when-owner-offline: true

